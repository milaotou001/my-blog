<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>博客管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 16px; }
  h1 { font-size: 20px; margin-bottom: 16px; text-align: center; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; margin-top: 12px; }
  input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; font-family: inherit; background: #fff; }
  textarea { min-height: 300px; line-height: 1.6; resize: vertical; font-size: 15px; }
  button { padding: 12px 20px; background: #222; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button:active { background: #000; }
  button:disabled { background: #999; }
  .btn-full { width: 100%; padding: 14px; font-size: 16px; margin-top: 12px; }
  .btn-outline { background: #fff; color: #222; border: 1px solid #ddd; }
  .msg { text-align: center; padding: 8px; margin-top: 8px; border-radius: 8px; font-size: 14px; display: none; }
  .msg.success { display: block; background: #e8f5e9; color: #2e7d32; }
  .msg.error { display: block; background: #ffebee; color: #c62828; }
  .hint { font-size: 12px; color: #999; margin-top: 2px; }

  /* Post list */
  .post-item { background: #fff; padding: 14px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .post-item .name { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .post-item button { padding: 8px 14px; font-size: 13px; white-space: nowrap; }

  /* Tags */
  .tag-row { display: flex; gap: 8px; margin-top: 4px; }
  .tag-row input { flex: 1; }
  .tag-row button { width: auto; padding: 10px 16px; margin: 0; font-size: 14px; background: #666; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tag { background: #e0e0e0; padding: 4px 10px; border-radius: 12px; font-size: 13px; display: flex; align-items: center; gap: 4px; }
  .tag .del { cursor: pointer; font-weight: bold; color: #999; }

  /* Tabs for editor/preview */
  .tabs { display: flex; gap: 0; margin-top: 12px; border-bottom: 2px solid #ddd; }
  .tabs button { flex: 1; padding: 10px; background: none; color: #888; border: none; border-radius: 8px 8px 0 0; font-size: 14px; }
  .tabs button.active { color: #222; border-bottom: 2px solid #222; margin-bottom: -2px; background: none; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Toolbar */
  .toolbar { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; background: #fafafa; border: 1px solid #ddd; border-top: none; }
  .toolbar button { padding: 6px 10px; background: #fff; color: #333; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; font-weight: normal; white-space: nowrap; }
  .toolbar button:active { background: #eee; }

  /* Preview */
  .preview { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; min-height: 300px; line-height: 1.8; font-size: 15px; word-break: break-word; }
  .preview h1,.preview h2,.preview h3 { margin-top: 1.2em; margin-bottom: 0.5em; }
  .preview h1 { font-size: 1.5em; }
  .preview h2 { font-size: 1.3em; }
  .preview p { margin: 0.6em 0; }
  .preview ul,.preview ol { padding-left: 1.5em; margin: 0.5em 0; }
  .preview code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  .preview pre { background: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; }
  .preview pre code { background: none; padding: 0; }
  .preview blockquote { border-left: 3px solid #ccc; padding-left: 12px; color: #666; margin: 0.8em 0; }
  .preview img { max-width: 100%; border-radius: 4px; }
  .preview a { color: #222; }

  /* Fullscreen editor */
  .fs-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; background: #fff; overflow: hidden; overscroll-behavior: none; }
  .fs-overlay .fs-toolbar { position: absolute; top: 0; left: 0; right: 0; z-index: 2; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; padding: 8px 10px; border-bottom: 1px solid #eee; background: #fff; }
  .fs-overlay .fs-toolbar button { padding: 8px 14px; font-size: 14px; background: #fff; color: #333; border: 1px solid #ddd; border-radius: 6px; white-space: nowrap; }
  .fs-overlay .fs-toolbar .fs-close { margin-left: auto; background: #222; color: #fff; border: none; padding: 8px 16px; }
  .fs-overlay .fs-toolbar .fs-tab { font-weight: 600; }
  .fs-overlay .fs-toolbar .fs-tab.on { color: #222; border-bottom: 2px solid #222; border-radius: 0; background: none; }
  .fs-overlay textarea { position: absolute; left: 0; right: 0; bottom: 0; border: none; border-radius: 0; padding: 16px; font-size: 16px; line-height: 1.8; resize: none; outline: none; font-family: inherit; overscroll-behavior: contain; }
  .fs-overlay .fs-preview { position: absolute; left: 0; right: 0; bottom: 0; overflow-y: auto; padding: 16px; line-height: 1.8; font-size: 16px; word-break: break-word; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
  .fs-overlay .fs-preview h1,.fs-overlay .fs-preview h2,.fs-overlay .fs-preview h3 { margin-top: 1.2em; margin-bottom: 0.5em; }
  .fs-overlay .fs-preview p { margin: 0.6em 0; }
  .fs-overlay .fs-preview ul,.fs-overlay .fs-preview ol { padding-left: 1.5em; }
  .fs-overlay .fs-preview code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  .fs-overlay .fs-preview pre { background: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; }
  .fs-overlay .fs-preview pre code { background: none; padding: 0; }
  .fs-overlay .fs-preview blockquote { border-left: 3px solid #ccc; padding-left: 12px; color: #666; margin: 0.8em 0; }

  /* Sections */
  .section { display: none; }
  .section.active { display: block; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .top-bar h1 { margin-bottom: 0; }
  .back-link { text-align: center; margin-top: 12px; }
  .back-link a { color: #999; font-size: 13px; }
</style>
</head>
<body>

<!-- Login -->
<div id="login" class="section active">
  <h1>登录编辑器</h1>
  <label>密码</label>
  <input id="pwd" type="password" placeholder="输入密码">
  <button class="btn-full" onclick="login()">登录</button>
  <div id="loginMsg" class="msg"></div>
</div>

<!-- Post List -->
<div id="list" class="section">
  <div class="top-bar">
    <h1>文章列表</h1>
    <button class="btn-outline" onclick="newPost()">+ 新建</button>
  </div>
  <div id="postList"></div>
  <div id="listMsg" class="msg"></div>
  <div class="back-link"><a href="/">← 返回博客</a></div>
</div>

<!-- Editor -->
<div id="editor" class="section">
  <h1 id="editorTitle">写文章</h1>
  <input type="hidden" id="editName">
  <input type="hidden" id="editSha">

  <label>标题</label>
  <input id="title" placeholder="文章标题">

  <label>日期</label>
  <input id="date" type="date">

  <label>分类</label>
  <input id="category" placeholder="如：技术、随笔">

  <label>标签</label>
  <form class="tag-row" onsubmit="addTag();return false">
    <input id="tagInput" placeholder="输入标签，点添加或按回车">
    <button type="submit">添加</button>
  </form>
  <div id="tags" class="tags"></div>

  <label>正文 <span class="hint">（Markdown 格式）</span></label>

  <div class="tabs">
    <button id="tabEdit" class="active" onclick="switchTab('edit')">编辑</button>
    <button id="tabPreview" onclick="switchTab('preview')">预览</button>
  </div>

  <div id="editPane" class="tab-content active">
    <div class="toolbar">
      <button onclick="wrap('**','**','加粗')" title="加粗">B</button>
      <button onclick="wrap('*','*','斜体')" title="斜体"><i>I</i></button>
      <button onclick="wrap('## ','','小标题')" title="小标题">H2</button>
      <button onclick="wrap('### ','','更小标题')" title="更小标题">H3</button>
      <button onclick="insertAtCursor('\n- ')" title="列表">列表</button>
      <button onclick="insertAtCursor('\n1. ')" title="编号">编号</button>
      <button onclick="wrap('> ','','引用')" title="引用">引用</button>
      <button onclick="wrap('[','](url)','链接')" title="链接">链接</button>
      <button onclick="wrap('`','`','代码')" title="代码">&lt;/&gt;</button>
      <button onclick="insertAtCursor('\n---\n')" title="分割线">分割</button>
      <button onclick="toggleFullscreen()" title="全屏编辑" style="margin-left:auto;background:#f0f0f0;">&#x26F6;</button>
    </div>
    <textarea id="content" placeholder="在这里写正文..." style="border-radius:0 0 8px 8px;"></textarea>
  </div>
  <div id="previewPane" class="tab-content">
    <div id="preview" class="preview" style="border-radius:0 0 8px 8px; margin-top:-1px">输入正文后点击预览</div>
  </div>

  <button id="publishBtn" class="btn-full" onclick="publish()">发布</button>
  <button class="btn-full btn-outline" onclick="backToList()" style="margin-top:8px">← 返回列表</button>
  <div id="msg" class="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
var tags = [];
var token = "";
var isEdit = false;

document.getElementById("date").value = new Date().toISOString().split("T")[0];

// ====== Toolbar ======
function insertAtCursor(text) {
  var ta = document.getElementById("content");
  var start = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.substring(0, start) + text + ta.value.substring(end);
  ta.selectionStart = ta.selectionEnd = start + text.length;
  ta.focus();
}

function wrap(before, after, placeholder) {
  var ta = document.getElementById("content");
  var start = ta.selectionStart, end = ta.selectionEnd;
  var selected = ta.value.substring(start, end) || placeholder;
  ta.value = ta.value.substring(0, start) + before + selected + after + ta.value.substring(end);
  ta.selectionStart = start + before.length;
  ta.selectionEnd = start + before.length + selected.length;
  ta.focus();
}

// ====== Markdown Preview ======
function switchTab(tab) {
  document.getElementById("tabEdit").classList.toggle("active", tab === "edit");
  document.getElementById("tabPreview").classList.toggle("active", tab === "preview");
  document.getElementById("editPane").classList.toggle("active", tab === "edit");
  document.getElementById("previewPane").classList.toggle("active", tab === "preview");
  if (tab === "preview") {
    var md = document.getElementById("content").value;
    document.getElementById("preview").innerHTML = md ? marked.parse(md, { breaks: true }) : '<p style="color:#999">正文为空</p>';
  }
}

// ====== Fullscreen Editor ======
function toggleFullscreen() {
  var existing = document.getElementById("fsOverlay");
  if (existing) {
    existing.remove();
    document.body.style.overflow = "";
    document.removeEventListener("keydown", window._fsKey);
    if (window.visualViewport) {
      window.visualViewport.removeEventListener("resize", window._fsLayout);
      window.visualViewport.removeEventListener("scroll", window._fsLayout);
    }
    window.removeEventListener("resize", window._fsLayout);
    return;
  }

  document.body.style.overflow = "hidden";

  // Measure toolbar and position textarea below it
  window._fsLayout = function() {
    var ov = document.getElementById("fsOverlay");
    if (!ov) return;
    var tb = ov.querySelector(".fs-toolbar");
    var th = tb ? tb.offsetHeight : 50;
    var ta = document.getElementById("fsTextarea");
    var pv = document.getElementById("fsPreview");
    if (ta) ta.style.top = th + "px";
    if (pv) pv.style.top = th + "px";
  };
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", window._fsLayout);
    window.visualViewport.addEventListener("scroll", window._fsLayout);
  }
  window.addEventListener("resize", window._fsLayout);
  // Run after layout settles
  setTimeout(window._fsLayout, 50);
  setTimeout(window._fsLayout, 300);

  var ta = document.getElementById("content");
  var md = ta.value;

  var overlay = document.createElement("div");
  overlay.id = "fsOverlay";
  overlay.className = "fs-overlay";

  // top bar: tabs + close on one row, format buttons below
  var top = document.createElement("div");
  top.className = "fs-toolbar";
  top.innerHTML = '<span style="display:flex;align-items:center;gap:6px;margin-right:auto;">'
    + '<button class="fs-tab on" id="fsTabEdit" onclick="fsSwitch(\'edit\')">编辑</button>'
    + '<button class="fs-tab" id="fsTabPreview" onclick="fsSwitch(\'preview\')">预览</button>'
    + '</span>'
    + '<button class="fs-close" onclick="toggleFullscreen()">关闭</button>'
    + '<span style="flex-basis:100%;height:4px;"></span>'
    + '<button onclick="fsWrap(\'**\',\'**\',\'加粗\')">B</button>'
    + '<button onclick="fsWrap(\'*\',\'*\',\'斜体\')"><i>I</i></button>'
    + '<button onclick="fsWrap(\'## \',\'\',\'小标题\')">H2</button>'
    + '<button onclick="fsWrap(\'### \',\'\',\'更小标题\')">H3</button>'
    + '<button onclick="fsInsert(\'\\n- \')">列表</button>'
    + '<button onclick="fsInsert(\'\\n1. \')">编号</button>'
    + '<button onclick="fsWrap(\'> \',\'\',\'引用\')">引用</button>'
    + '<button onclick="fsWrap(\'[\',\'](url)\',\'链接\')">链接</button>'
    + '<button onclick="fsWrap(\'`\',\'`\',\'代码\')">&lt;/&gt;</button>'
    + '<button onclick="fsInsert(\'\\n---\\n\')">分割</button>';

  // editor textarea
  var ta2 = document.createElement("textarea");
  ta2.id = "fsTextarea";
  ta2.value = md;

  // preview div
  var pv = document.createElement("div");
  pv.id = "fsPreview";
  pv.className = "fs-preview";
  pv.style.display = "none";
  pv.innerHTML = md ? marked.parse(md, { breaks: true }) : '<p style="color:#999">正文为空</p>';

  overlay.appendChild(top);
  overlay.appendChild(ta2);
  overlay.appendChild(pv);
  document.body.appendChild(overlay);

  // Swipe right to dismiss with animation
  var swipeX = 0, swipeStart = 0, swiping = false;
  overlay.addEventListener("touchstart", function(e) {
    swipeStart = e.touches[0].clientX;
    swipeX = 0;
    swiping = false;
  }, { passive: true });
  overlay.addEventListener("touchmove", function(e) {
    var dx = e.touches[0].clientX - swipeStart;
    if (dx > 10 || swiping) {
      swiping = true;
      swipeX = Math.max(0, dx);
      overlay.style.transition = "none";
      overlay.style.transform = "translateX(" + swipeX + "px)";
    }
  }, { passive: true });
  overlay.addEventListener("touchend", function() {
    overlay.style.transition = "transform 0.25s ease";
    if (swipeX > 120) {
      overlay.style.transform = "translateX(100%)";
      setTimeout(function() { toggleFullscreen(); }, 260);
    } else {
      overlay.style.transform = "translateX(0)";
      swipeX = 0;
      swiping = false;
    }
  });

  // Esc or back gesture to close
  window._fsKey = function(e) { if (e.key === "Escape") toggleFullscreen(); };
  document.addEventListener("keydown", window._fsKey);

  // helper functions on window so onclick can reach them
  window.fsWrap = function(before, after, placeholder) {
    var t = document.getElementById("fsTextarea");
    var start = t.selectionStart, end = t.selectionEnd;
    var selected = t.value.substring(start, end) || placeholder;
    t.value = t.value.substring(0, start) + before + selected + after + t.value.substring(end);
    t.selectionStart = start + before.length;
    t.selectionEnd = start + before.length + selected.length;
    t.focus();
  };
  window.fsInsert = function(text) {
    var t = document.getElementById("fsTextarea");
    var start = t.selectionStart, end = t.selectionEnd;
    t.value = t.value.substring(0, start) + text + t.value.substring(end);
    t.selectionStart = t.selectionEnd = start + text.length;
    t.focus();
  };
  window.fsSwitch = function(tab) {
    document.getElementById("fsTabEdit").className = "fs-tab" + (tab === "edit" ? " on" : "");
    document.getElementById("fsTabPreview").className = "fs-tab" + (tab === "preview" ? " on" : "");
    document.getElementById("fsTextarea").style.display = tab === "edit" ? "" : "none";
    document.getElementById("fsPreview").style.display = tab === "preview" ? "" : "none";
    if (tab === "preview") {
      var m = document.getElementById("fsTextarea").value;
      document.getElementById("fsPreview").innerHTML = m ? marked.parse(m, { breaks: true }) : '<p style="color:#999">正文为空</p>';
    }
  };

  ta2.focus();
  ta2.setSelectionRange(ta.selectionStart, ta.selectionEnd);
}

// Before saving/publishing, sync fullscreen content back to original textarea
var origPublish = publish;
publish = function() {
  var fs = document.getElementById("fsOverlay");
  if (fs) {
    document.getElementById("content").value = document.getElementById("fsTextarea").value;
    fs.remove();
    document.body.style.overflow = "";
    document.removeEventListener("keydown", window._fsKey);
    if (window.visualViewport) {
      window.visualViewport.removeEventListener("resize", window._fsLayout);
      window.visualViewport.removeEventListener("scroll", window._fsLayout);
    }
    window.removeEventListener("resize", window._fsLayout);
  }
  origPublish();
};

// ====== Auth ======
function api(body) {
  var tok = token || localStorage.getItem("blog_token") || "";
  return fetch("/api/write-post", {
    method: "POST",
    headers: { "Authorization": "Basic " + tok, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); });
}

function login() {
  var pwd = document.getElementById("pwd").value;
  if (!pwd) return;
  token = btoa("admin:" + pwd);
  var msg = document.getElementById("loginMsg");
  msg.textContent = "验证中..."; msg.className = "msg"; msg.style.display = "block";
  api({ action: "check" }).then(function(r) {
    if (r.ok) {
      localStorage.setItem("blog_token", token);
      showSection("list");
      loadList();
    } else {
      msg.textContent = "密码错误"; msg.className = "msg error";
    }
  });
}

// ====== Post List ======
function loadList() {
  api({ action: "list" }).then(function(r) {
    var el = document.getElementById("postList");
    if (!r.ok || !Array.isArray(r.data)) {
      el.innerHTML = '<p style="color:#999;text-align:center;padding:20px">暂无文章</p>';
      return;
    }
    el.innerHTML = r.data.map(function(p) {
      return '<div class="post-item">'
        + '<span class="name">' + esc(p.title || p.name) + '</span>'
        + '<button onclick="editPost(\'' + esc(p.name) + '\')">编辑</button>'
        + '</div>';
    }).join("");
    document.getElementById("listMsg").textContent = "共 " + r.data.length + " 篇文章";
    document.getElementById("listMsg").className = "msg success";
  });
}

function editPost(name) {
  api({ action: "get", name: name }).then(function(r) {
    if (!r.ok) { alert("加载失败: " + (r.data.error || "")); return; }
    var d = r.data;
    isEdit = true;
    document.getElementById("editorTitle").textContent = "编辑文章";
    document.getElementById("editName").value = d.name;
    document.getElementById("editSha").value = d.sha;
    document.getElementById("title").value = d.title || "";
    document.getElementById("date").value = d.date || "";
    document.getElementById("category").value = d.categories || "";
    document.getElementById("content").value = d.content || "";
    tags = Array.isArray(d.tags) ? d.tags : (d.tags ? [d.tags] : []);
    renderTags();
    document.getElementById("publishBtn").textContent = "保存修改";
    switchTab("edit");
    showSection("editor");
  });
}

function newPost() {
  isEdit = false;
  document.getElementById("editorTitle").textContent = "写文章";
  document.getElementById("editName").value = "";
  document.getElementById("editSha").value = "";
  document.getElementById("title").value = "";
  document.getElementById("date").value = new Date().toISOString().split("T")[0];
  document.getElementById("category").value = "";
  document.getElementById("content").value = "";
  tags = [];
  renderTags();
  document.getElementById("publishBtn").textContent = "发布";
  document.getElementById("msg").className = "msg";
  switchTab("edit");
  showSection("editor");
}

function backToList() {
  showSection("list");
  loadList();
}

// ====== Editor ======
function addTag() {
  var v = document.getElementById("tagInput").value.trim();
  if (v && tags.indexOf(v) === -1) { tags.push(v); renderTags(); }
  document.getElementById("tagInput").value = "";
}
function removeTag(i) { tags.splice(i, 1); renderTags(); }
function renderTags() {
  document.getElementById("tags").innerHTML = tags.map(function(t, i) {
    return '<span class="tag">' + esc(t) + '<span class="del" onclick="removeTag(' + i + ')">&times;</span></span>';
  }).join("");
}

function publish() {
  var btn = document.getElementById("publishBtn");
  var title = document.getElementById("title").value.trim();
  var date = document.getElementById("date").value;
  var category = document.getElementById("category").value.trim();
  var content = document.getElementById("content").value.trim();

  if (!title) { showMsg("请填写标题", "error"); return; }
  if (!content) { showMsg("请填写正文", "error"); return; }

  btn.disabled = true;
  btn.textContent = isEdit ? "保存中..." : "发布中...";

  var payload = { title: title, date: date, categories: category, tags: tags, content: content };

  if (isEdit) {
    payload.action = "update";
    payload.name = document.getElementById("editName").value;
    payload.sha = document.getElementById("editSha").value;
  }

  api(payload).then(function(r) {
    btn.disabled = false;
    btn.textContent = isEdit ? "保存修改" : "发布";
    if (r.ok) {
      showMsg(isEdit ? "修改成功！" : "发布成功！稍后刷新博客即可看到。", "success");
      if (isEdit) {
        document.getElementById("editSha").value = r.data.sha || "";
      } else {
        document.getElementById("title").value = "";
        document.getElementById("content").value = "";
        tags = []; renderTags();
      }
    } else {
      showMsg(r.data.error || "操作失败", "error");
    }
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = isEdit ? "保存修改" : "发布";
    showMsg("网络错误，请重试", "error");
  });
}

function showMsg(text, type) {
  var m = document.getElementById("msg");
  m.textContent = text; m.className = "msg " + type;
}

// ====== Util ======
function showSection(name) {
  ["login","list","editor"].forEach(function(s) {
    document.getElementById(s).classList.toggle("active", s === name);
  });
}
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

// ====== Auto login ======
(function() {
  var saved = localStorage.getItem("blog_token");
  if (saved) {
    token = saved;
    api({ action: "check" }).then(function(r) {
      if (r.ok) { showSection("list"); loadList(); }
    });
  }
})();
</script>
